<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-14px); }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0);    }
      }
      .float      { animation: float 4s ease-in-out infinite; }
      .fade-in-up { animation: fadeInUp 0.7s ease-out both; }
      .delay-1    { animation-delay: 0.4s; }
      .delay-2    { animation-delay: 0.7s; }
      @keyframes orb1Move {
        0%, 100% { transform: translate(  0px,   0px); }
        25%       { transform: translate( 45px, -35px); }
        50%       { transform: translate( 15px,  30px); }
        75%       { transform: translate(-35px, -15px); }
      }
      @keyframes orb2Move {
        0%, 100% { transform: translate(  0px,  0px); }
        33%       { transform: translate(-35px, 30px); }
        66%       { transform: translate( 25px,-28px); }
      }
      @keyframes orb3Move {
        0%, 100% { transform: translate(  0px,  0px); }
        40%       { transform: translate( 30px,-28px); }
        80%       { transform: translate(-25px, 22px); }
      }
      .orb1 { animation: orb1Move 14s ease-in-out        infinite; }
      .orb2 { animation: orb2Move 18s ease-in-out  4s    infinite; }
      .orb3 { animation: orb3Move 16s ease-in-out  8s    infinite; }
    </style>

    <!-- 近黑底色（带缓慢色调偏移） -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07000f">
        <animate attributeName="stop-color"
          values="#07000f;#0a0020;#06000e;#07000f"
          dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0d031e">
        <animate attributeName="stop-color"
          values="#0d031e;#160535;#0b0218;#0d031e"
          dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- 网格图案（更细腻） -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a855f7" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>

    <!-- 网格蒙版：中心可见，边缘淡出 -->
    <radialGradient id="grid-fade" cx="400" cy="200" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <mask id="grid-mask">
      <rect width="800" height="400" fill="url(#grid-fade)"/>
    </mask>

    <!-- logo 渐变（userSpaceOnUse 使坐标与 512×512 viewBox 对齐） -->
    <linearGradient id="logo-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <!-- 光晕模糊滤镜 -->
    <filter id="orbBlur" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>

  </defs>

  <!-- 1. 背景层 -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>

  <!-- 2. 氛围光晕（aurora glow orbs） -->
  <!-- 主紫色，图标正后方 -->
  <circle class="orb1" cx="400" cy="155" r="185" fill="#6d28d9" fill-opacity="0.45" filter="url(#orbBlur)"/>
  <!-- 亮紫/品红，右上角高光 -->
  <circle class="orb2" cx="690" cy="45"  r="130" fill="#a855f7" fill-opacity="0.28" filter="url(#orbBlur)"/>
  <!-- 深蓝紫，左下角暗调 -->
  <circle class="orb3" cx="75"  cy="370" r="155" fill="#4338ca" fill-opacity="0.22" filter="url(#orbBlur)"/>

  <!-- 3. 网格层 -->
  <rect width="100%" height="100%" fill="url(#grid)" mask="url(#grid-mask)"/>

  <!-- 3. 悬浮的图标组（嵌入 logo.svg 内容） -->
  <g class="float">
    <svg x="350" y="110" width="100" height="100" viewBox="0 0 512 512">
        <rect width="512" height="512" rx="104" fill="url(#logo-bg)"/>
        <path
          d="M130 150H382C420 150 442 172 442 210V290C442 328 420 350 382 350H270L210 410V350H130C92 350 70 328 70 290V210C70 172 92 150 130 150Z"
          fill="none" stroke="white" stroke-width="24" stroke-linejoin="round"/>
        <g stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <path d="M 192 300 L 226 200"/>
          <path d="M 272 300 V 200 H 290 A 30 34 0 0 1 290 268 H 272"/>
        </g>
    </svg>
  </g>

  <!-- 4. 标题文字（淡入上浮） -->
  <g class="fade-in-up delay-1">
    <text x="400" y="280" fill="white" font-size="52"
      font-family="system-ui, -apple-system, sans-serif"
      font-weight="bold" text-anchor="middle">Quick Prompt</text>
  </g>

  <!-- 5. 副标题文字（淡入上浮） -->
  <g class="fade-in-up delay-2">
    <text x="400" y="336" fill="white" fill-opacity="0.75" font-size="20"
      font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
      font-weight="500" text-anchor="middle" letter-spacing="1"
      >一个强大的浏览器扩展，专注于提示词管理与快速输入。</text>
  </g>
</svg>
